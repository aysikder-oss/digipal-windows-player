name: Build Windows Player

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Windows executables
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: DigipalPlayer-Installer
          path: release/*.exe
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Portable
        uses: actions/upload-artifact@v4
        with:
          name: DigipalPlayer-Portable
          path: release/DigipalPlayer-*-portable.exe
          retention-days: 30
          if-no-files-found: warn
